<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>CRM</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#fff;
}

h1 {
  text-align:center;
  padding:20px;
}

.container {
  display:flex;
  gap:15px;
  padding:15px;
  overflow-x:auto;
}

.column {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  width:300px;
  min-height:400px;
}

.column h2 {
  text-align:center;
}

.card {
  background:#334155;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  cursor:grab;
}

.card small {
  display:block;
  color:#94a3b8;
}

.top {
  padding:15px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

input {
  padding:8px;
  border:none;
  border-radius:5px;
}

button {
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:5px;
  color:#fff;
  cursor:pointer;
}

.stats {
  padding:15px;
}
</style>

</head>
<body>

<h1>CRM</h1>

<div class="top">
<input id="product" placeholder="Товар">
<input id="price" type="number" placeholder="Ціна">
<input id="cost" type="number" placeholder="Закупка">
<input id="ads" type="number" placeholder="Реклама">
<button onclick="addOrder()">Додати</button>
</div>

<div class="container">

<div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="new">
<h2>Нові</h2>
</div>

<div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="work">
<h2>В роботі</h2>
</div>

<div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="sent">
<h2>Відправлено</h2>
</div>

<div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" data-status="done">
<h2>Завершено</h2>
</div>

</div>

<div class="stats" id="stats"></div>

<script>
let data = JSON.parse(localStorage.getItem('crm2') || '[]');

function save() {
  localStorage.setItem('crm2', JSON.stringify(data));
}

function render() {
  document.querySelectorAll('.column').forEach(col => col.innerHTML = "<h2>"+col.querySelector("h2").innerText+"</h2>");

  let profit=0, revenue=0, ads=0;

  data.forEach((d,i) => {
    let p = d.price - d.cost - d.ads;
    profit += p;
    revenue += d.price;
    ads += d.ads;

    let card = document.createElement('div');
    card.className = 'card';
    card.draggable = true;
    card.ondragstart = e => e.dataTransfer.setData("id", i);

    card.innerHTML = `
      <b>${d.product}</b>
      <small>💰 ${d.price} | Прибуток: ${p}</small>
    `;

    document.querySelector(`[data-status=${d.status}]`).appendChild(card);
  });

  document.getElementById('stats').innerHTML = `
  Оборот: ${revenue} грн<br>
  Прибуток: ${profit} грн<br>
  Реклама: ${ads} грн`;
}

function addOrder() {
  let obj = {
    product: product.value,
    price:+price.value,
    cost:+cost.value,
    ads:+ads.value,
    status:'new'
  };

  data.push(obj);
  save();
  render();
}

function allowDrop(e){e.preventDefault();}

function drop(e){
  e.preventDefault();
  let id = e.dataTransfer.getData("id");
  let status = e.currentTarget.dataset.status;
  data[id].status = status;
  save();
  render();
}

render();
</script>

</body>
</html>
