<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>TopDr CRM v3</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }
.container { padding:20px; }
h1 { text-align:center; }

input, select {
  padding:8px; margin:5px; border-radius:6px; border:none;
}

button {
  padding:8px 12px; border:none; border-radius:6px;
  background:#3b82f6; color:white; cursor:pointer;
}

table {
  width:100%; margin-top:20px; border-collapse: collapse;
}

td, th {
  padding:10px; border-bottom:1px solid #1e293b;
}

tr:hover { background:#1e293b; cursor:pointer; }

.modal {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none; justify-content:center; align-items:center;
}

.modal-content {
  background:#1e293b; padding:20px;
  border-radius:10px; width:320px;
}
</style>
</head>

<body>

<div class="container">
<h1>CRM</h1>

<input id="search" placeholder="Пошук...">

<br>

<input id="product" placeholder="Товар">
<input id="client" placeholder="Клієнт">
<input id="phone" placeholder="Телефон">
<input id="price" placeholder="Ціна">

<button onclick="addOrder()">Додати</button>

<table>
<thead>
<tr>
<th>Товар</th>
<th>Клієнт</th>
<th>Телефон</th>
<th>Ціна</th>
<th>Статус</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<h3>Замовлення</h3>

<input id="m_product">
<input id="m_client">
<input id="m_phone">
<input id="m_price">
<input id="m_ttn" placeholder="ТТН">

<select id="m_status">
<option>Новий</option>
<option>В роботі</option>
<option>Відправлено</option>
<option>Завершено</option>
</select>

<br><br>

<button onclick="saveOrder()">Зберегти</button>
<button onclick="markDone()">Отримано</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAxbOlBZcd49xyhcSfOjjqWcUdwKAddwO0",
  authDomain: "topdr-crm.firebaseapp.com",
  projectId: "topdr-crm"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let orders = [];
let currentId = null;

db.collection("orders").onSnapshot(snapshot=>{
  orders = [];
  snapshot.forEach(doc=>{
    orders.push({id:doc.id, ...doc.data()});
  });
  renderOrders();
});

function addOrder(){
  db.collection("orders").add({
    product: product.value,
    client: client.value,
    phone: phone.value,
    price: +price.value,
    status:"Новий",
    ttn:""
  });
}

function renderOrders(){
  const q = search.value.toLowerCase();
  const table = document.getElementById("orders");
  table.innerHTML="";

  orders
  .filter(o => 
    o.product.toLowerCase().includes(q) ||
    o.client.toLowerCase().includes(q) ||
    o.phone.includes(q)
  )
  .forEach(o=>{
    table.innerHTML += `
      <tr onclick="openModal('${o.id}')">
        <td>${o.product}</td>
        <td>${o.client}</td>
        <td>${o.phone}</td>
        <td>${o.price}</td>
        <td>${o.status}</td>
      </tr>
    `;
  });
}

function openModal(id){
  currentId = id;
  const o = orders.find(x=>x.id==id);

  m_product.value = o.product;
  m_client.value = o.client;
  m_phone.value = o.phone;
  m_price.value = o.price;
  m_status.value = o.status;
  m_ttn.value = o.ttn || "";

  modal.style.display="flex";
}

function saveOrder(){
  db.collection("orders").doc(currentId).update({
    product:m_product.value,
    client:m_client.value,
    phone:m_phone.value,
    price:+m_price.value,
    status:m_status.value,
    ttn:m_ttn.value
  });

  modal.style.display="none";
}

function markDone(){
  db.collection("orders").doc(currentId).update({
    status:"Завершено"
  });
  modal.style.display="none";
}

search.oninput = renderOrders;

window.onclick = (e)=>{
  if(e.target.id==="modal"){
    modal.style.display="none";
  }
}
</script>

</body>
</html>
